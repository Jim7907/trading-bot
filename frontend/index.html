<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OHLC Prob Bot</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:       #0d1117;
    --card:     #161b22;
    --border:   #30363d;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --green:    #3fb950;
    --red:      #f85149;
    --yellow:   #d29922;
    --blue:     #58a6ff;
    --purple:   #bc8cff;
    --accent:   #1f6feb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  /* ── Layout ── */
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 700; color: var(--blue); letter-spacing: .5px; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-demo  { background: #1c2d40; color: var(--blue); }
  .badge-live  { background: #3d1c1c; color: var(--red); }
  .badge-run   { background: #1a3a1c; color: var(--green); animation: pulse 1.5s infinite; }
  .badge-stop  { background: #2a2a2a; color: var(--muted); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  header .spacer { flex: 1; }

  .btn { padding: 7px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-start  { background: var(--green); color: #000; }
  .btn-stop   { background: var(--red);   color: #fff; }
  .btn-config { background: var(--accent); color: #fff; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  main { padding: 20px 24px; display: grid; gap: 16px; }

  /* ── Stat cards ── */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .stat-card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
  .stat-card .value { font-size: 24px; font-weight: 700; }
  .stat-card .sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--text); }

  /* ── Two-col grid ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 860px) { .two-col { grid-template-columns: 1fr; } }

  /* ── Cards ── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; display: flex; align-items: center; gap: 8px; }
  .card-body { padding: 14px 16px; }

  /* ── Position chips ── */
  .positions-list { display: flex; flex-wrap: wrap; gap: 10px; }
  .pos-chip { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; min-width: 180px; }
  .pos-chip .sym  { font-weight: 700; font-size: 15px; }
  .pos-chip .info { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.6; }
  .pos-chip.long  { border-left: 3px solid var(--green); }
  .pos-chip.short { border-left: 3px solid var(--red); }

  /* ── Table ── */
  .tbl-wrap { overflow-x: auto; max-height: 320px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { position: sticky; top: 0; background: var(--card); color: var(--muted); text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  td { padding: 7px 10px; border-bottom: 1px solid #21262d; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1c2128; }
  .tag { padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .tag-long  { background: #1a3a1c; color: var(--green); }
  .tag-short { background: #3d1c1c; color: var(--red); }
  .tag-tp    { background: #1a3a1c; color: var(--green); }
  .tag-sl    { background: #3d1c1c; color: var(--red); }
  .tag-eod   { background: #2a2a2a; color: var(--muted); }

  /* ── Chart ── */
  .chart-wrap { position: relative; height: 220px; }

  /* ── Log ── */
  .log-box { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; height: 240px; overflow-y: auto; padding: 10px; font-family: 'Cascadia Code', 'Fira Mono', monospace; font-size: 11.5px; line-height: 1.7; }
  .log-line { color: var(--muted); }
  .log-line.signal  { color: var(--blue); }
  .log-line.error   { color: var(--red); }
  .log-line.filled  { color: var(--green); }
  .log-line.closed  { color: var(--yellow); }

  /* ── Config modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 440px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; margin-bottom: 5px; }
  .field input, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px 10px; font-size: 13px; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--blue); }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
  .btn-cancel { background: #21262d; color: var(--text); }

  /* ── Symbol filter tabs ── */
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab { padding: 4px 14px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Empty states ── */
  .empty { color: var(--muted); font-size: 12px; padding: 16px 0; text-align: center; }

  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-green { background: var(--green); }
  .dot-red   { background: var(--red); }
  .dot-grey  { background: var(--muted); }
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1>⚡ OHLC Prob Bot</h1>
  <span id="envBadge" class="badge badge-demo">DEMO</span>
  <span id="runBadge" class="badge badge-stop">STOPPED</span>
  <div class="spacer"></div>
  <button class="btn btn-config" onclick="openConfig()">⚙ Config</button>
  <button id="startBtn" class="btn btn-start" onclick="startBot()">▶ Start</button>
  <button id="stopBtn"  class="btn btn-stop"  onclick="stopBot()" disabled>■ Stop</button>
</header>

<!-- ── Main ── -->
<main>

  <!-- Stats row -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">Equity</div>
      <div class="value neu" id="statEquity">—</div>
      <div class="sub">account balance</div>
    </div>
    <div class="stat-card">
      <div class="label">Net P&L</div>
      <div class="value neu" id="statPnl">—</div>
      <div class="sub">closed trades</div>
    </div>
    <div class="stat-card">
      <div class="label">Win Rate</div>
      <div class="value neu" id="statWR">—</div>
      <div class="sub" id="statTradeCount">0 trades</div>
    </div>
    <div class="stat-card">
      <div class="label">Open Positions</div>
      <div class="value neu" id="statOpen">0</div>
      <div class="sub" id="statSymbols">—</div>
    </div>
  </div>

  <!-- Equity curve + Open positions -->
  <div class="two-col">
    <div class="card">
      <div class="card-header">📈 Equity Curve</div>
      <div class="card-body">
        <div class="chart-wrap"><canvas id="equityChart"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">🔵 Open Positions</div>
      <div class="card-body">
        <div class="positions-list" id="positionsList">
          <div class="empty">No open positions</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Trade history + Logs -->
  <div class="two-col">
    <div class="card">
      <div class="card-header">
        📋 Trade History
        <div class="spacer"></div>
        <div class="tabs" id="symbolTabs"></div>
      </div>
      <div class="card-body" style="padding:0">
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>Symbol</th><th>Side</th><th>Entry</th><th>Exit</th>
              <th>P&L</th><th>Result</th><th>Closed</th>
            </tr></thead>
            <tbody id="tradesTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        🖥 Live Log
        <div class="spacer"></div>
        <label style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer">
          <input type="checkbox" id="autoScroll" checked /> Auto-scroll
        </label>
      </div>
      <div class="card-body" style="padding:8px">
        <div class="log-box" id="logBox"></div>
      </div>
    </div>
  </div>

</main>

<!-- ── Config Modal ── -->
<div class="modal-overlay" id="configModal">
  <div class="modal">
    <h2>⚙ Strategy Configuration</h2>
    <div class="field">
      <label>Symbols (comma separated)</label>
      <input id="cfgSymbols" placeholder="AMC,AAPL" />
    </div>
    <div class="field">
      <label>Trade Direction</label>
      <select id="cfgDir">
        <option value="Both">Both</option>
        <option value="Long Only">Long Only</option>
        <option value="Short Only">Short Only</option>
      </select>
    </div>
    <div class="field">
      <label>Risk per Trade (%)</label>
      <input id="cfgRisk" type="number" step="0.1" min="0.1" max="5" placeholder="1.0" />
    </div>
    <div class="field">
      <label>Conviction Threshold (0.5–1.0)</label>
      <input id="cfgThreshold" type="number" step="0.01" min="0.5" max="1.0" placeholder="0.60" />
    </div>
    <div class="field">
      <label>ATR Stop Multiplier</label>
      <input id="cfgAtr" type="number" step="0.1" min="0.5" max="5" placeholder="1.5" />
    </div>
    <div class="field">
      <label>Risk:Reward Ratio</label>
      <input id="cfgRR" type="number" step="0.1" min="0.5" max="10" placeholder="2.0" />
    </div>
    <div class="field">
      <label style="flex-direction:row;gap:8px;display:flex;align-items:center">
        <input type="checkbox" id="cfgEma" /> EMA 200 Trend Filter
      </label>
    </div>
    <div class="field">
      <label style="flex-direction:row;gap:8px;display:flex;align-items:center">
        <input type="checkbox" id="cfgTime" /> Avoid open/EOD (09:45–15:45 ET)
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeConfig()">Cancel</button>
      <button class="btn btn-start" onclick="saveConfig()">Save</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let filterSymbol = 'ALL';
let trades = [];
let equityData = [];
let equityChart = null;
let wsLogs = null;
let cfg = {};

// ── Chart init ────────────────────────────────────────────────────────────
function initChart() {
  const ctx = document.getElementById('equityChart').getContext('2d');
  equityChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Equity', data: [],
      borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,.08)',
      borderWidth: 2, pointRadius: 0, fill: true, tension: 0.3 }] },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e', callback: v => '$' + v.toLocaleString() } }
      }
    }
  });
}

// ── API helpers ───────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

// ── Render ────────────────────────────────────────────────────────────────
function fmt(v, digits=2) { return Number(v).toFixed(digits); }
function fmtMoney(v) {
  const n = Number(v);
  const cls = n >= 0 ? 'pos' : 'neg';
  return `<span class="${cls}">${n >= 0 ? '+' : ''}$${Math.abs(n).toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2})}</span>`;
}
function fmtTime(iso) {
  try { return new Date(iso).toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit'}); }
  catch { return iso || '—'; }
}

function renderStatus(s) {
  // badges
  document.getElementById('envBadge').textContent = s.env;
  document.getElementById('envBadge').className   = 'badge ' + (s.env === 'LIVE' ? 'badge-live' : 'badge-demo');
  const rb = document.getElementById('runBadge');
  rb.textContent = s.running ? '● RUNNING' : '○ STOPPED';
  rb.className   = 'badge ' + (s.running ? 'badge-run' : 'badge-stop');
  document.getElementById('startBtn').disabled = s.running;
  document.getElementById('stopBtn').disabled  = !s.running;

  // stats
  const eq = s.equity || 0;
  document.getElementById('statEquity').innerHTML = `$${eq.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const pnlEl = document.getElementById('statPnl');
  pnlEl.innerHTML = fmtMoney(s.net_pnl);
  pnlEl.className = 'value ' + (s.net_pnl >= 0 ? 'pos' : 'neg');
  const wr = s.win_rate || 0;
  document.getElementById('statWR').innerHTML = `<span class="${wr >= 50 ? 'pos' : 'neg'}">${fmt(wr,1)}%</span>`;
  document.getElementById('statTradeCount').textContent = `${s.total_trades} closed trades`;
  document.getElementById('statOpen').textContent = s.open_positions;
  document.getElementById('statSymbols').textContent = (s.symbols || []).join(', ');

  // config form prefill
  cfg = s.config || {};
}

function renderPositions(pos) {
  const el = document.getElementById('positionsList');
  const entries = Object.entries(pos);
  if (!entries.length) {
    el.innerHTML = '<div class="empty">No open positions</div>';
    return;
  }
  el.innerHTML = entries.map(([sym, p]) => `
    <div class="pos-chip ${p.side}">
      <div class="sym">${sym} <span class="tag tag-${p.side}">${p.side.toUpperCase()}</span></div>
      <div class="info">
        Entry: ${fmt(p.entry, 4)}<br>
        SL: ${fmt(p.sl, 4)} &nbsp; TP: ${fmt(p.tp, 4)}<br>
        Qty: ${p.shares} &nbsp; Prob: ${(p.prob*100).toFixed(1)}%<br>
        Status: ${p.status}
      </div>
    </div>`).join('');
}

function buildSymbolTabs(tradeList) {
  const syms = ['ALL', ...new Set(tradeList.map(t => t.symbol))];
  document.getElementById('symbolTabs').innerHTML = syms.map(s =>
    `<div class="tab ${s === filterSymbol ? 'active' : ''}" onclick="setFilter('${s}')">${s}</div>`
  ).join('');
}

function setFilter(s) {
  filterSymbol = s;
  renderTrades(trades);
}

function renderTrades(list) {
  buildSymbolTabs(list);
  const filtered = filterSymbol === 'ALL' ? list : list.filter(t => t.symbol === filterSymbol);
  const rows = [...filtered].reverse().slice(0, 100);
  const tbody = document.getElementById('tradesTbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">No trades yet</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(t => `
    <tr>
      <td><strong>${t.symbol || t.ticker || '?'}</strong></td>
      <td><span class="tag tag-${t.side}">${t.side?.toUpperCase()}</span></td>
      <td>${fmt(t.entry, 4)}</td>
      <td>${fmt(t.exit, 4)}</td>
      <td>${fmtMoney(t.pnl)}</td>
      <td><span class="tag tag-${(t.result||'').toLowerCase()}">${t.result || '—'}</span></td>
      <td>${fmtTime(t.closed_at)}</td>
    </tr>`).join('');
}

function renderEquityChart(history) {
  if (!equityChart || !history.length) return;
  const labels = history.map(h => h.ts ? new Date(h.ts).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}) : '');
  const data   = history.map(h => h.equity);
  equityChart.data.labels = labels;
  equityChart.data.datasets[0].data = data;
  equityChart.update('none');
}

// ── WebSocket logs ─────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  wsLogs = new WebSocket(`${proto}://${location.host}/ws/logs`);
  wsLogs.onmessage = e => appendLog(e.data);
  wsLogs.onclose   = () => setTimeout(connectWS, 3000);
}

function appendLog(line) {
  const box = document.getElementById('logBox');
  const el  = document.createElement('div');
  el.className = 'log-line' +
    (line.includes('SIGNAL') ? ' signal' : '') +
    (line.includes('ERROR')  ? ' error'  : '') +
    (line.includes('FILLED') ? ' filled' : '') +
    (line.includes('CLOSED') || line.includes('HIT') ? ' closed' : '');
  el.textContent = line;
  box.appendChild(el);
  if (document.getElementById('autoScroll').checked) {
    box.scrollTop = box.scrollHeight;
  }
  // cap DOM nodes
  while (box.children.length > 300) box.removeChild(box.firstChild);
}

// ── Polling ────────────────────────────────────────────────────────────────
async function refresh() {
  try {
    const [status, positions, tradeList, equity] = await Promise.all([
      api('/api/status'),
      api('/api/positions'),
      api('/api/trades?limit=200'),
      api('/api/equity'),
    ]);
    renderStatus(status);
    renderPositions(positions);
    trades = tradeList;
    renderTrades(trades);
    equityData = equity;
    renderEquityChart(equity);
  } catch(e) {
    console.error('refresh error', e);
  }
}

// ── Bot controls ───────────────────────────────────────────────────────────
async function startBot() {
  await api('/api/bot', 'POST', { action: 'start' });
  refresh();
}

async function stopBot() {
  await api('/api/bot', 'POST', { action: 'stop' });
  refresh();
}

// ── Config modal ───────────────────────────────────────────────────────────
function openConfig() {
  document.getElementById('cfgSymbols').value   = (cfg.symbols || []).join(',');
  document.getElementById('cfgDir').value       = cfg.trade_dir || 'Both';
  document.getElementById('cfgRisk').value      = ((cfg.risk_pct || 0.01) * 100).toFixed(1);
  document.getElementById('cfgThreshold').value = cfg.threshold || 0.60;
  document.getElementById('cfgAtr').value       = cfg.atr_mult  || 1.5;
  document.getElementById('cfgRR').value        = cfg.rr_ratio  || 2.0;
  document.getElementById('cfgEma').checked     = cfg.use_ema  !== false;
  document.getElementById('cfgTime').checked    = cfg.use_time !== false;
  document.getElementById('configModal').classList.add('open');
}

function closeConfig() {
  document.getElementById('configModal').classList.remove('open');
}

async function saveConfig() {
  const body = {
    symbols:   document.getElementById('cfgSymbols').value.split(',').map(s=>s.trim()).filter(Boolean),
    trade_dir: document.getElementById('cfgDir').value,
    risk_pct:  parseFloat(document.getElementById('cfgRisk').value) / 100,
    threshold: parseFloat(document.getElementById('cfgThreshold').value),
    atr_mult:  parseFloat(document.getElementById('cfgAtr').value),
    rr_ratio:  parseFloat(document.getElementById('cfgRR').value),
    use_ema:   document.getElementById('cfgEma').checked,
    use_time:  document.getElementById('cfgTime').checked,
  };
  await api('/api/config', 'POST', body);
  closeConfig();
  refresh();
}

// close modal on overlay click
document.getElementById('configModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeConfig();
});

// ── Boot ───────────────────────────────────────────────────────────────────
initChart();
connectWS();
refresh();
setInterval(refresh, 5000);   // poll every 5s
</script>
</body>
</html>
